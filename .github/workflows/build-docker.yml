name: Reusable Docker build and push workflow

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      username:
        required: true
        type: string
      app_name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      push:
        required: true
        type: boolean
    secrets:
      DOCKER_PASSWORD:
        required: false
      DEV_DOCKER_PASSWORD:
        required: false
      DOCKER_PASSWORD_SEC:
        required: false

jobs:
  docker-build-main:
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Docker Login for pslpricwydregistry
      if: ${{ inputs.push == true && github.ref_name == 'main' }}
      uses: docker/login-action@v3
      with:
        registry: pslpricwydregistry
        username: ${{ inputs.username }}
        password: ${{ secrets.DOCKER_PASSWORD_SEC }}

    - name: Docker Login for cwydcontainerregpk
      if: ${{ inputs.push == true && github.ref_name == 'main' }}
      uses: docker/login-action@v3
      with:
        registry: cwydcontainerregpk
        username: ${{ inputs.username }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Build Docker Image and push to pslpricwydregistry
      if: ${{ inputs.push == true && github.ref_name == 'main' }}
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        push: true
        tags: |
          pslpricwydregistry/${{ inputs.app_name }}:${{ github.ref_name == 'main' && 'latest' || 'default' }}
          pslpricwydregistry/${{ inputs.app_name }}:${{ steps.date.outputs.date }}_${{ github.run_number }}

    - name: Build Docker Image and push to cwydcontainerregpk
      if: ${{ inputs.push == true && github.ref_name == 'main' }}
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        push: true
        tags: |
          cwydcontainerregpk/${{ inputs.app_name }}:${{ github.ref_name == 'main' && 'latest' || 'default' }}
          cwydcontainerregpk/${{ inputs.app_name }}:${{ steps.date.outputs.date }}_${{ github.run_number }}

  docker-build-dev-demo:
    runs-on: ubuntu-latest
    if: ${{ inputs.push == true && (github.ref_name == 'dev' || github.ref_name == 'demo') }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Docker Login for cwydcontainerregpk
      if: ${{ inputs.push == true && (github.ref_name == 'dev' || github.ref_name == 'demo') }}
      uses: docker/login-action@v3
      with:
        registry: cwydcontainerregpk
        username: ${{ inputs.username }}
        password: ${{ secrets.DEV_DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Build Docker Image and push to cwydcontainerregpk
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        push: true
        tags: |
          cwydcontainerregpk/${{ inputs.app_name }}:${{ github.ref_name == 'main' && 'latest' || 'default' }}
          cwydcontainerregpk/${{ inputs.app_name }}:${{ steps.date.outputs.date }}_${{ github.run_number }}
